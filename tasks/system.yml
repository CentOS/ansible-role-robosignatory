# tasks for base system setup
---
- name: Importing specific distro variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
    - "{{ ansible_distribution }}.yml"
  tags:
    - vars
    - always

- name: Add the koji buildtools repo if needed
  template:
    src: koji.repo.j2
    dest: /etc/yum.repos.d/koji.repo
    mode: 0644
  when: robosignatory_buildtools_repo
  tags:
    - repo

- name: Adding repo gpg key if needed
  copy:
    src: "files/{{ robosignatory_buildtools_repo_gpgkey }}"
    dest: "/etc/pki/rpm-gpg/{{ robosignatory_buildtools_repo_gpgkey }}"
  when: robosignatory_buildtools_repo
  tags:
    - repo

- name: Installing rpm-sign helper
  yum:
    name: "{{ robosignatory_rpmsign_pkg_url }}"
    state: installed
    disable_gpg_check: yes
  tags:
    - pkgs

- name: Installing other needed tech-preview pkgs
  yum:
    name: "{{ robosignatory_techpreview_pkgs }}"
    state: installed
    disable_gpg_check: yes
  tags:
    - pkgs
